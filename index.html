<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Warehouse Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#121212">
</head>
<body>

  <main id="app">
    <section id="tab-add" class="tab-content active">
      <h2>Добавить запись</h2>
      <form id="add-form">
        <div class="form-group">
          <label>Сотрудник</label>
          <select id="input-employee" required></select>
        </div>

        <div class="form-group">
          <label>Модель</label>
          <select id="input-model" required></select>
        </div>

        <div class="form-group">
          <label>Цвет</label>
          <input type="text" id="input-color" required>
          <div id="quick-colors" class="quick-btns"></div>
        </div>

        <div class="form-group">
          <label>Размер</label>
          <input type="text" id="input-size" required>
          <div id="quick-sizes" class="quick-btns"></div>
        </div>

        <div class="form-group">
          <label>Количество</label>
          <input type="number" id="input-qty" min="1" required>
        </div>

        <div class="form-group">
          <label>Комментарий</label>
          <input type="text" id="input-note">
        </div>

        <div class="btn-group">
          <button type="button" id="btn-clear" class="btn btn-secondary">Очистить</button>
          <button type="submit" class="btn btn-primary">Сохранить</button>
        </div>
      </form>
    </section>

    <section id="tab-history" class="tab-content">
      <h2>История</h2>
      <div class="filters">
        <input type="text" id="filter-search" placeholder="Поиск...">
        <div class="filter-grid">
          <select id="filter-employee"><option value="">Все сотрудники</option></select>
        </div>
      </div>
      <div id="history-summary" class="summary-bar"></div>
      <div id="history-list" class="list-container"></div>
    </section>

    <section id="tab-stats" class="tab-content">
      <h2>Статистика</h2>
      <div class="tabs-sub">
        <button class="sub-tab active" data-period="today">Сегодня</button>
        <button class="sub-tab" data-period="week">Неделя</button>
        <button class="sub-tab" data-period="month">Месяц</button>
        <button class="sub-tab" data-period="all">Всё время</button>
      </div>
      <div id="stats-general" class="stats-grid"></div>
      
      <div class="stats-section">
        <h3>🔥 ТОП РАЗМЕРОВ</h3>
        <div id="stats-top-sizes" class="top-list"></div>
      </div>
      <div class="stats-section">
        <h3>Топ Моделей (нажми для деталей)</h3>
        <div id="stats-top-models" class="top-list"></div>
      </div>
      <div class="stats-section">
        <h3>Динамика (14 дней)</h3>
        <div id="chart-container" class="chart"></div>
      </div>
    </section>

    <section id="tab-settings" class="tab-content">
      <h2>Настройки</h2>
      <div class="settings-group">
        <label>Сотрудники (через запятую)</label>
        <textarea id="set-employees" rows="2"></textarea>
      </div>
      <div class="settings-group">
        <label>Модели (через запятую)</label>
        <textarea id="set-models" rows="2"></textarea>
      </div>
      <button id="btn-save-settings" class="btn btn-primary" style="width:100%">Сохранить настройки</button>
    </section>
  </main>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Детали</h3>
        <button onclick="closeModal()" class="close-btn">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast">Сохранено!</div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-target="tab-add">➕ Добавить</button>
    <button class="nav-btn" data-target="tab-history">📋 История</button>
    <button class="nav-btn" data-target="tab-stats">📊 Статс</button>
    <button class="nav-btn" data-target="tab-settings">⚙️ Настр.</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
